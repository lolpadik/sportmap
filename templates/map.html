{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
<h2 class="mb-4">{{ t.map }}</h2>

<div class="d-flex flex-wrap gap-2 mb-2">
    <button class="btn btn-outline-light btn-sm city-btn active" data-city="all">Все города</button>
    <button class="btn btn-outline-light btn-sm city-btn" data-city="Минск">Минск</button>
    <button class="btn btn-outline-light btn-sm city-btn" data-city="Гомель">Гомель</button>
    <button class="btn btn-outline-light btn-sm city-btn" data-city="Могилёв">Могилёв</button>
    <button class="btn btn-outline-light btn-sm city-btn" data-city="Брест">Брест</button>
    <button class="btn btn-outline-light btn-sm city-btn" data-city="Гродно">Гродно</button>
    <button class="btn btn-outline-light btn-sm city-btn" data-city="Витебск">Витебск</button>
</div>

<div class="d-flex flex-wrap gap-2 mb-2">
    <button class="btn btn-outline-info btn-sm sport-btn active" data-sport="all">Все виды</button>
    <button class="btn btn-outline-info btn-sm sport-btn" data-sport="⚽ Футбол">⚽ Футбол</button>
    <button class="btn btn-outline-info btn-sm sport-btn" data-sport="🏀 Баскетбол">🏀 Баскетбол</button>
    <button class="btn btn-outline-info btn-sm sport-btn" data-sport="🏐 Волейбол">🏐 Волейбол</button>
    <button class="btn btn-outline-info btn-sm sport-btn" data-sport="🏒 Хоккей">🏒 Хоккей</button>
    <button class="btn btn-outline-info btn-sm sport-btn" data-sport="🎾 Теннис">🎾 Теннис</button>
    <button class="btn btn-outline-info btn-sm sport-btn" data-sport="🏋️ Воркаут">🏋️ Воркаут</button>
    <button class="btn btn-outline-info btn-sm sport-btn" data-sport="🛹 Скейтбординг">🛹 Скейтбординг</button>
    <button class="btn btn-outline-info btn-sm sport-btn" data-sport="🏃 Бег">🏃 Бег</button>
</div>

<div class="mb-3">
    <input type="text" id="searchInput" class="form-control" placeholder="🔍 Поиск по адресу...">
</div>

<div id="map" style="height: 500px; border-radius: 15px;"></div>
<p class="text-muted mt-2">Кликни на карту чтобы предложить новую площадку</p>
{% if user %}
<button class="btn btn-warning mt-2" data-bs-toggle="modal" data-bs-target="#suggestModal">📩 Предложить площадку</button>
{% endif %}
</div>

{% if user %}
<div class="modal fade" id="suggestModal" tabindex="-1">
  <div class="modal-dialog">
    <form method="post" action="/suggest_ground">
      <div class="modal-content">
        <div class="modal-header"><h5>Предложить новую площадку</h5></div>
        <div class="modal-body">
            <input type="text" name="name" class="form-control mb-2" placeholder="Название" required>
            <select name="sport_type" class="form-control mb-2" required>
                <option value="">Выберите вид спорта</option>
                <option value="⚽ Футбол">⚽ Футбол</option>
                <option value="🏀 Баскетбол">🏀 Баскетбол</option>
                <option value="🏐 Волейбол">🏐 Волейбол</option>
                <option value="🏒 Хоккей">🏒 Хоккей</option>
                <option value="🎾 Теннис">🎾 Теннис</option>
                <option value="🏸 Бадминтон">🏸 Бадминтон</option>
                <option value="🏓 Настольный теннис">🏓 Настольный теннис</option>
                <option value="🥋 Единоборства">🥋 Единоборства</option>
                <option value="🏋️ Воркаут">🏋️ Воркаут</option>
                <option value="🛹 Скейтбординг">🛹 Скейтбординг</option>
                <option value="🏃 Бег">🏃 Бег</option>
                <option value="🚴 Велоспорт">🚴 Велоспорт</option>
                <option value="🏊 Плавание">🏊 Плавание</option>
            </select>
            <input type="text" name="address" class="form-control mb-2" placeholder="Адрес" required>
            <input type="text" id="latInput" name="lat" class="form-control mb-2" placeholder="Координаты (кликни на карту)" readonly required>
            <input type="text" id="lonInput" name="lon" class="form-control mb-2" placeholder="Координаты (кликни на карту)" readonly required>
            <textarea name="description" class="form-control mb-2" placeholder="Описание"></textarea>
        </div>
        <div class="modal-footer"><button class="btn btn-success">Отправить</button></div>
      </div>
    </form>
  </div>
</div>
{% endif %}

<script src="https://api-maps.yandex.ru/2.1/?apikey=3f0a3f83-4f48-4378-9a0f-6ac3a7d2d9a8&lang=ru_RU" type="text/javascript"></script>
<script type="text/javascript">
    ymaps.ready(function () {
        var cityCoords = {
            'Минск': [53.9, 27.56],
            'Гомель': [52.43, 31.0],
            'Могилёв': [53.9, 30.33],
            'Брест': [52.1, 23.7],
            'Гродно': [53.68, 23.83],
            'Витебск': [55.19, 30.2]
        };
        
        var map = new ymaps.Map('map', { center: [53.9, 27.56], zoom: 7 });
        var allGrounds = {{ grounds_json | safe }};
        var currentCity = 'all';
        var currentSport = 'all';
        var searchText = '';
        
        function showGrounds() {
            map.geoObjects.removeAll();
            var filtered = allGrounds.filter(function(g) {
                var cityMatch = currentCity === 'all' || g.city === currentCity;
                var sportMatch = currentSport === 'all' || g.sport_type.indexOf(currentSport) !== -1;
                var searchMatch = !searchText || g.address.toLowerCase().indexOf(searchText.toLowerCase()) !== -1 || g.name.toLowerCase().indexOf(searchText.toLowerCase()) !== -1;
                return cityMatch && sportMatch && searchMatch;
            });
            filtered.forEach(function(g) {
                var color, status;
                if (g.has_active) { color = 'islands#greenCircleIcon'; status = '🟢 Идёт игра'; }
                else if (g.has_upcoming) { color = 'islands#yellowCircleIcon'; status = '🟡 Предстоит игра'; }
                else { color = 'islands#blueCircleIcon'; status = '🔵 Нет игр'; }
                var pm = new ymaps.Placemark([g.lat, g.lon], {
                    balloonContent: '<b>' + g.name + '</b><br><i>' + g.sport_type + '</i><br>' + g.address + '<br>' + status + '<br><a href="/ground/' + g.id + '?lang={{ lang }}">Подробнее</a>'
                }, { preset: color });
                map.geoObjects.add(pm);
            });
        }
        
        showGrounds();
        
        document.querySelectorAll('.city-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.city-btn').forEach(function(b) { b.classList.remove('active'); });
                this.classList.add('active');
                currentCity = this.dataset.city;
                showGrounds();
                if (currentCity !== 'all') map.setCenter(cityCoords[currentCity], 12);
                else map.setCenter([53.9, 27.56], 7);
            });
        });
        
        document.querySelectorAll('.sport-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.sport-btn').forEach(function(b) { b.classList.remove('active'); });
                this.classList.add('active');
                currentSport = this.dataset.sport;
                showGrounds();
            });
        });
        
        document.getElementById('searchInput').addEventListener('input', function() {
            searchText = this.value;
            showGrounds();
        });
        
        map.events.add('click', function(e) {
            var coords = e.get('coords');
            document.getElementById('latInput').value = coords[0].toFixed(6);
            document.getElementById('lonInput').value = coords[1].toFixed(6);
            var modal = new bootstrap.Modal(document.getElementById('suggestModal'));
            modal.show();
        });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}
