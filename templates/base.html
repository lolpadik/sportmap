<!DOCTYPE html>
<html lang="{{ lang }}" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportMap Belarus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        [data-bs-theme="dark"] body { background-color: #1a1a2e; color: #eee; }
        [data-bs-theme="dark"] .card { background-color: #16213e; color: #eee; }
        [data-bs-theme="dark"] .navbar { background: #0f3460 !important; }
        [data-bs-theme="dark"] .btn-outline-warning { color: #ffc107; border-color: #ffc107; }
        [data-bs-theme="dark"] .btn-outline-info { color: #0dcaf0; border-color: #0dcaf0; }
        [data-bs-theme="dark"] .btn-outline-warning.active { background-color: #ffc107; color: #000; }
        [data-bs-theme="dark"] .btn-outline-info.active { background-color: #0dcaf0; color: #000; }
        [data-bs-theme="dark"] .form-control { background-color: #16213e; color: #eee; border-color: #333; }
        [data-bs-theme="dark"] .modal-content { background-color: #16213e; color: #eee; }
        [data-bs-theme="dark"] .text-muted { color: #aaa !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-0">
        <div class="container">
            <a class="navbar-brand" href="/?lang={{ lang }}">⚽ SportMap Belarus</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/map?lang={{ lang }}">🗺️ {{ t.map }}</a>
                <a class="nav-link" href="/stats?lang={{ lang }}">📊 {{ t.stats }}</a>
                {% if user %}
                    <a class="nav-link text-light" href="/profile?lang={{ lang }}">👤 {{ user.username }}</a>
                    <a class="nav-link" href="/logout">🚪 {{ t.logout }}</a>
                {% else %}
                    <a class="nav-link" href="/login?lang={{ lang }}">🔑 {{ t.login }}</a>
                    <a class="nav-link" href="/register?lang={{ lang }}">📝 {{ t.register }}</a>
                {% endif %}
                <button class="btn btn-sm btn-outline-light ms-2" id="themeToggle">🌙</button>
                <div class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">🌐 {{ t.language }}</a>
                    <div class="dropdown-menu dropdown-menu-end">
                        <a class="dropdown-item lang-switch" href="#" data-lang="ru">🇷🇺 Русский</a>
                        <a class="dropdown-item lang-switch" href="#" data-lang="be">🇧🇾 Беларуская</a>
                        <a class="dropdown-item lang-switch" href="#" data-lang="en">🇬🇧 English</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <div class="container-fluid p-0">
        {% block content %}{% endblock %}
    </div>
    
    <button id="chatBtn" style="position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;background:#8b5cf6;color:#fff;border:none;font-size:24px;z-index:999;">💬</button>
    <div id="chatBox" style="position:fixed;bottom:90px;right:20px;width:300px;height:400px;background:#1a1a2e;border-radius:15px;box-shadow:0 0 20px rgba(0,0,0,0.5);z-index:999;display:none;flex-direction:column;">
        <div style="background:#8b5cf6;padding:10px;border-radius:15px 15px 0 0;color:#fff;font-weight:bold;display:flex;justify-content:space-between;align-items:center;">
            {{ t.chat_admin }}
            <button id="clearChat" style="background:none;border:none;color:#fff;font-size:16px;cursor:pointer;" title="{{ t.clear_chat }}">🗑️</button>
        </div>
        <div id="chatMessages" style="flex:1;overflow-y:auto;padding:10px;color:#fff;"></div>
        <form id="chatForm" style="display:flex;padding:10px;gap:5px;" autocomplete="off">
            <input type="text" id="chatInput" class="form-control" placeholder="{{ t.type_message }}" required autocomplete="off">
            <button class="btn btn-sm" style="background:#8b5cf6;color:#fff;">➤</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', theme);
            document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
            document.getElementById('themeToggle').addEventListener('click', function() {
                var newTheme = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-bs-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                this.textContent = newTheme === 'dark' ? '☀️' : '🌙';
            });
            
            document.getElementById('chatBtn').addEventListener('click', function() {
                var box = document.getElementById('chatBox');
                box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
            });
            
            var chatHistory = JSON.parse(localStorage.getItem('chatHistory') || '[]');
            chatHistory.forEach(function(item) {
                var side = item.type === 'user' ? 'right' : 'left';
                var color = item.type === 'user' ? '#8b5cf6' : '#10b981';
                document.getElementById('chatMessages').innerHTML += '<div style="text-align:' + side + ';margin:5px;"><span style="background:' + color + ';padding:5px 10px;border-radius:10px;">' + item.text + '</span></div>';
            });
            
            document.getElementById('chatForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                var input = document.getElementById('chatInput');
                var msg = input.value;
                if (!msg.trim()) return;
                input.value = '';
                document.getElementById('chatMessages').innerHTML += '<div style="text-align:right;margin:5px;"><span style="background:#8b5cf6;padding:5px 10px;border-radius:10px;">' + msg + '</span></div>';
                chatHistory.push({type: 'user', text: msg});
                localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
                await fetch('/chat_send', { method: 'POST', headers: {'Content-Type': 'application/x-www-form-urlencoded'}, body: 'text=' + encodeURIComponent(msg) });
            });
            
            document.getElementById('clearChat').addEventListener('click', function() {
                document.getElementById('chatMessages').innerHTML = '';
                localStorage.removeItem('chatHistory');
                chatHistory = [];
            });
            
            document.querySelectorAll('.lang-switch').forEach(function(link) {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    var url = new URL(window.location.href);
                    url.searchParams.set('lang', this.dataset.lang);
                    window.location.href = url.toString();
                });
            });
        });
        
        setInterval(async function() {
            var res = await fetch('/chat_check');
            var data = await res.json();
            if (data.reply) {
                document.getElementById('chatMessages').innerHTML += '<div style="text-align:left;margin:5px;"><span style="background:#10b981;padding:5px 10px;border-radius:10px;">' + data.reply + '</span></div>';
                var chatHistory = JSON.parse(localStorage.getItem('chatHistory') || '[]');
                chatHistory.push({type: 'admin', text: data.reply});
                localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
                await fetch('/chat_clear');
            }
        }, 5000);
    </script>
</body>
</html>
