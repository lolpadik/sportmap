<!DOCTYPE html>
<html lang="{{ lang }}" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportMap Belarus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        [data-bs-theme="dark"] body { background-color: #1a1a2e; color: #eee; }
        [data-bs-theme="dark"] .card { background-color: #16213e; color: #eee; }
        [data-bs-theme="dark"] .navbar { background: #0f3460 !important; }
        [data-bs-theme="dark"] .btn-outline-warning { color: #ffc107; border-color: #ffc107; }
        [data-bs-theme="dark"] .btn-outline-info { color: #0dcaf0; border-color: #0dcaf0; }
        [data-bs-theme="dark"] .btn-outline-warning.active { background-color: #ffc107; color: #000; }
        [data-bs-theme="dark"] .btn-outline-info.active { background-color: #0dcaf0; color: #000; }
        [data-bs-theme="dark"] .form-control { background-color: #16213e; color: #eee; border-color: #333; }
        [data-bs-theme="dark"] .modal-content { background-color: #16213e; color: #eee; }
        [data-bs-theme="dark"] .text-muted { color: #aaa !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-0">
        <div class="container">
            <a class="navbar-brand" href="/?lang={{ lang }}">⚽ SportMap Belarus</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/map?lang={{ lang }}">{{ t.map }}</a>
                {% if user %}
                    <a class="nav-link text-light" href="/profile?lang={{ lang }}">👤 {{ user.username }}</a>
                    <a class="nav-link" href="/logout">{{ t.logout }}</a>
                {% else %}
                    <a class="nav-link" href="/login?lang={{ lang }}">{{ t.login }}</a>
                    <a class="nav-link" href="/register?lang={{ lang }}">{{ t.register }}</a>
                {% endif %}
                <button class="btn btn-sm btn-outline-light ms-2" id="themeToggle">🌙</button>
                <div class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">🌐 {{ t.language }}</a>
                    <div class="dropdown-menu dropdown-menu-end">
                        <a class="dropdown-item" href="?lang=ru">🇷🇺 Русский</a>
                        <a class="dropdown-item" href="?lang=be">🇧🇾 Беларуская</a>
                        <a class="dropdown-item" href="?lang=en">🇬🇧 English</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <div class="container-fluid p-0">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        var theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', theme);
        document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
        document.getElementById('themeToggle').addEventListener('click', function() {
            var newTheme = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            this.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        });
    </script>
</body>
</html>
