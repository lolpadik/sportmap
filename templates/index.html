{% extends "base.html" %}
{% block content %}
<style>
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }
    @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-80px); }
        to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
        from { opacity: 0; transform: translateX(80px); }
        to { opacity: 1; transform: translateX(0); }
    }
    @keyframes typing {
        from { max-width: 0; }
        to { max-width: 100%; }
    }
    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
    }
    .animate-title { animation: fadeInUp 0.8s ease-out; }
    .typing-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 40px;
    }
    .typing-text {
        overflow: hidden;
        white-space: nowrap;
        max-width: 0;
        animation: typing 2s steps(40) 0.5s forwards;
    }
    .typing-cursor {
        display: inline-block;
        width: 3px;
        height: 28px;
        background: #ffc107;
        margin-left: 2px;
        animation: blink 0.7s step-end infinite;
        flex-shrink: 0;
    }
    .typing-cursor.hidden {
        animation: none;
        opacity: 0;
    }
    .animate-btn { animation: fadeInUp 0.8s ease-out 2.5s both, pulse 2s ease-in-out 3.5s infinite; }
    .icon-1 { animation: slideInLeft 0.8s ease-out 0.1s both; font-size: 2rem; }
    .icon-2 { animation: slideInLeft 0.8s ease-out 0.2s both; font-size: 2rem; }
    .icon-3 { animation: slideInLeft 0.8s ease-out 0.3s both; font-size: 2rem; }
    .icon-4 { animation: slideInRight 0.8s ease-out 0.4s both; font-size: 2rem; }
    .icon-5 { animation: slideInRight 0.8s ease-out 0.3s both; font-size: 2rem; }
    .icon-6 { animation: slideInRight 0.8s ease-out 0.2s both; font-size: 2rem; }
</style>

<div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); z-index: -1;"></div>

<div class="text-center d-flex flex-column justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="d-flex align-items-center justify-content-center gap-3 mb-4">
        <span class="icon-1">⚽</span>
        <span class="icon-2">🏀</span>
        <span class="icon-3">🏐</span>
        <span class="icon-4">🎾</span>
        <span class="icon-5">🏒</span>
        <span class="icon-6">🛹</span>
    </div>

    <h1 class="display-3 fw-bold text-white animate-title mb-3" style="text-shadow: 2px 2px 8px rgba(0,0,0,0.5);">
        {{ t.find_play }}
    </h1>

    <div class="typing-wrapper mb-4">
        <span class="lead text-white typing-text" style="text-shadow: 1px 1px 5px rgba(0,0,0,0.5);">
            {{ t.all_grounds }}
        </span>
        <span class="typing-cursor" id="cursor"></span>
    </div>

    <a href="/map?lang={{ lang }}" class="btn btn-warning btn-lg px-5 py-3 animate-btn" style="font-weight: bold; border-radius: 50px; font-size: 1.3rem;">
        🗺️ {{ t.open_map }}
    </a>
</div>

<script>
setTimeout(function() {
    document.getElementById('cursor').classList.add('hidden');
}, 2500);
</script>
{% endblock %}
