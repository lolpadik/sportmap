{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
<h2>📊 Статистика видов спорта</h2>
<div class="row mt-4">
{% for sport, count in sport_counts.items() %}
<div class="col-md-4 mb-3">
    <div class="card p-3">
        <h3>{{ sport }}</h3>
        <h5>{{ count }} площадок</h5>
        <div class="progress mt-2" style="height: 10px;">
            <div class="progress-bar bg-success" style="width: {{ (count / sport_counts.values()|sum * 100)|round }}%;"></div>
        </div>
    </div>
</div>
{% endfor %}
</div>
</div>
{% endblock %}
